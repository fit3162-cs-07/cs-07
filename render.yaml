services:
  - type: web
    name: cs07-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: REPOSITORY_DRIVER
        value: mongo
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
